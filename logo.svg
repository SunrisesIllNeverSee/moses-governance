<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0E0E0E"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#C4923A" stroke-width="6" opacity="0.35"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="#C4923A" stroke-width="1.5" opacity="0.2"/>

  <!-- § mark — centered, gold -->
  <text
    x="256"
    y="310"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="240"
    font-weight="400"
    fill="#C4923A"
    text-anchor="middle"
  >§</text>

  <!-- Subtle stroke layer for depth -->
  <text
    x="256"
    y="310"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="240"
    font-weight="400"
    fill="none"
    stroke="#C4923A"
    stroke-width="1"
    opacity="0.25"
    text-anchor="middle"
  >§</text>
</svg>
